<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>create-v-consume</title>
  <meta
    name="description"
    content="Track how much you consume versus creating. See where your time is going."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 font-[Plus_Jakarta_Sans] select-none">
  
  <header class="px-6">
    <div class="max-w-6xl py-4 m-auto">
      <a href="https://github.com/drehcodes" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 bg-slate-200 text-slate-500 py-2 px-3 rounded-full text-xs hover:bg-slate-300 transition">
        <span class="iconify h-4 w-4" data-icon="octicon:mark-github-16"></span>
        <span class="font-medium">drehcodes</span>
      </a>
    </div>

      <p class="text-slate-500 text-xs">
        A minimal tracker that shows whether your time is
        spent <b><i>creating</i></b> or <b><i>consuming</i></b> — in real time.
      </p>
    </div>
  </header>

  <main class="px-6">

    <!-- Modal -->
    <div id="edit-entry-modal" class="fixed inset-0 flex justify-center items-center p-6 z-10 hidden">
      <div class="w-full max-w-2xl">
        <div class="bg-white rounded-lg shadow-lg p-6">
          <div class="flex flex-col gap-8">
            
            <div class="flex justify-between">
              <h2 class="text-xl font-semibold text-stone-950">Edit Entry</h2>
                <button type="button" id="close-modal-btn"
                  class="flex items-center justify-center w-10 h-10 text-slate-400 cursor-pointer transition-all ease-in-out duration-200 hover:scale-105 hover:text-slate-500">
                  <span class="iconify h-5 w-5" data-icon="mdi:close"></span>
                </button>
            </div>

            <div class="flex flex-col flex-grow gap-4">

              <div>
                <label class="mb-2 block text-sm font-bold uppercase tracking-wider text-slate-500">Mode</label>
                <div class="relative">
                  <select id="select-mode"
                    class="block w-full appearance-none rounded-xl border border-slate-200 bg-slate-50 p-3 text-base font-semibold text-slate-900 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 cursor-pointer"/>
                    <option value="Creating">Creating</option>
                    <option value="Consuming">Consuming</option>
                  </select>
                  <span class="iconify pointer-events-none absolute right-3 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-400"
                    data-icon="ph:caret-down-bold"></span>
                </div>
              </div>

              <div class="flex flex-col flex-grow">
                <span class="mb-2 block text-sm font-bold uppercase tracking-wider text-slate-500">Time</span>
                <div class="flex flex-col gap-2">
                  <div>
                    <h3 class="mb-2 block text-xs font-medium uppercase tracking-wider text-slate-500">Hours</h3>
                    <input id="hours-input" type="number" required placeholder="0"
                      class="block w-full appearance-none rounded-xl border border-slate-200 bg-slate-50 p-3 text-base font-semibold text-slate-900 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100"/>
                  </div>
                  <div>
                    <h3 class="mb-2 block text-xs font-medium uppercase tracking-wider text-slate-500">Minutes</h3>
                    <input id="minutes-input" type="number" min="0" max="59" required placeholder="0"
                      class="block w-full appearance-none rounded-xl border border-slate-200 bg-slate-50 p-3 text-base font-semibold text-slate-900 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100"/>
                  </div>
                  <div>
                    <h3 class="mb-2 block text-xs font-medium uppercase tracking-wider text-slate-500">Seconds</h3>
                    <input id="seconds-input" type="number" min="0" max="59" required placeholder="0"
                      class="block w-full appearance-none rounded-xl border border-slate-200 bg-slate-50 p-3 text-base font-semibold text-slate-900 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100"/>
                  </div>
                </div>
              </div>

              <div class="mt-4">
                <button type="button" id="modal-save-entry" class="block w-full bg-indigo-600 rounded-md p-3 text-slate-50 font-medium transition-all ease-in-out hover:bg-indigo-600/90 cursor-pointer">Save Changes</button>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Timer -->
    <section class="max-w-6xl py-4 m-auto">
      <div class="flex flex-col gap-10 bg-white ring-2 ring-slate-100 rounded-md p-8 shadow-lg">
        <div class="flex justify-center">
          <div id="toggle-container" class="bg-slate-200 p-1 rounded-md inset-shadow-xs">
            <button id="creating-toggle" class="bg-slate-500 px-4 py-2 text-slate-200 text-xs font-bold rounded-sm cursor-pointer transition-all duration-100 ease-in-out">Creating</button>
            <button id="consuming-toggle" class="px-4 py-2 text-slate-500 text-xs font-bold rounded-sm cursor-pointer transition-all duration-100 ease-in-out">Consuming</button>
          </div>
        </div>
        <div class="flex flex-col justify-center items-center gap-6"> 
          <span id="timer-display" class="text-6xl font-bold text-slate-500">00:00:00</span>
          <div class="flex justify-center item gap-2">
            
              <button type="button" id="timer-start-btn" class="flex items-center justify-center gap-2 bg-indigo-600 text-slate-50 text-sm font-bold px-6 h-10 rounded-md cursor-pointer transition-all ease-in-out duration-200 hover:scale-105">
                <span class="iconify h-5 w-5" data-icon="mdi:play"></span>
                Start
              </button>
            
            
              <button type="button" id="timer-reset-btn" class="flex items-center justify-center w-10 h-10 bg-slate-200 text-slate-500 rounded-md cursor-pointer transition-all ease-in-out duration-200 hover:scale-105 hover:bg-indigo-600 hover:text-slate-50">
                <span class="iconify h-5 w-5" data-icon="mdi:timer-refresh-outline"></span>
              </button>
            
            
              <button type="button" id="timer-stop-btn" class="flex items-center justify-center w-10 h-10 bg-slate-200 text-slate-500 rounded-md cursor-pointer transition-all ease-in-out duration-200 hover:scale-105 hover:bg-indigo-600 hover:text-slate-50">
                <span class="iconify h-5 w-5" data-icon="mdi:stop"></span>
              </button>
            
          </div>
        </div>
      </div>
    </section>

    <!-- Ratio Bar -->
    <section class="max-w-6xl m-auto">
      <div class="flex flex-col gap-2 bg-white ring ring-slate-100 rounded-md p-6">
        <div class="flex justify-between">
          <span class="text-xs text-green-600/50 font-bold">Created</span>
          <span class="text-xs text-red-600/50 font-bold">Consumed</span>
        </div>
        <div class="flex w-full rounded-sm h-4 overflow-hidden">
          <div id="creating-bar" class="bg-green-600 h-full transition-all duration-500 ease-out"></div>
          <div id="consuming-bar" class="bg-red-600 h-full transition-all duration-500 ease-out"></div>
        </div>
        <span id="ratio-info" class="text-xs text-center mt-2"></span>
      </div>
    </section>

    <!-- Entries -->
    <section id="entries" class="max-w-6xl mt-6 m-auto">
      <div id="entries-list" class="flex flex-col gap-2"></div>
    </section>

  </main>
  
  <script src="js/app.js"></script>
</body>
</html>
